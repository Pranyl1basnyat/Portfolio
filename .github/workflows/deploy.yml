name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: List directory structure (Debug)
        run: ls -la

      - name: List Asset-Linker folder (Debug)
        run: ls -la ./Asset-Linker

      - name: Install dependencies
        working-directory: ./Asset-Linker
        run: pnpm install --frozen-lockfile

      - name: Build Project
        working-directory: ./Asset-Linker
        run: pnpm build

      - name: Check if dist folder exists (Debug)
        run: ls -la ./Asset-Linker/dist

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './Asset-Linker/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
